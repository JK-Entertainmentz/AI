<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Company Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-gray-800 font-sans antialiased min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    
    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        <section class="mb-8 border border-gray-200 rounded-lg p-6 shadow-sm">
            <h2 class="text-xl font-bold mb-4 text-gray-900">กำหนดวาระการประชุม</h2>
            <form id="meeting-form" class="flex gap-4">
                <input type="text" id="topic-input" required placeholder="พิมพ์เป้าหมาย หรือ ปัญหาที่ต้องการให้ทีม AI แก้ไข..." class="flex-grow border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:border-gray-900 focus:ring-1 focus:ring-gray-900">
                <button type="submit" id="start-btn" class="bg-gray-900 text-white px-6 py-2 rounded-md hover:bg-gray-800 transition-colors">เริ่มการประชุม</button>
            </form>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section class="border border-gray-200 rounded-lg shadow-sm flex flex-col h-[600px]">
                <div class="bg-gray-50 border-b border-gray-200 p-4 rounded-t-lg">
                    <h3 class="font-bold text-gray-900">ห้องประชุม AI Workflow</h3>
                </div>
                <div id="chat-container" class="flex-grow overflow-y-auto p-4 space-y-4">
                    <div class="text-gray-400 text-sm text-center mt-4">กรุณากำหนดวาระเพื่อเริ่มการทำงาน</div>
                </div>
            </section>

            <section class="border border-gray-200 rounded-lg shadow-sm flex flex-col h-[600px]">
                <div class="bg-gray-50 border-b border-gray-200 p-4 rounded-t-lg">
                    <h3 class="font-bold text-gray-900">บทสรุปและการตัดสินใจ (CEO)</h3>
                </div>
                <div id="summary-container" class="flex-grow overflow-y-auto p-6 prose prose-sm max-w-none text-gray-700">
                    <div class="text-gray-400 text-sm text-center mt-4">บทสรุปจะปรากฏขึ้นหลังจากการประชุมเสร็จสิ้น</div>
                </div>
            </section>
        </div>
    </main>

    <footer class="border-t border-gray-200 py-6 text-center text-gray-500 text-sm mt-auto">
        &copy; 2026 AI Company Simulation. All rights reserved.
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
